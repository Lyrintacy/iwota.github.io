<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Room Portfolio</title>
  <link href="https://fonts.google.com/share?selection.family=Bitcount+Prop+Double:wght@100..900|Concert+One|Staatliches" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body,#root{width:100%;height:100%;overflow:hidden;background:#000000;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.02);}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
    ::selection{background:rgba(99,102,241,0.3);color:#fff;}
    input,textarea,select{outline:none;}
    button{cursor:pointer;border:none;outline:none;}
  </style>
</head>
<body><div id="root"></div></body>
</html>
